name: Temporary Supabase read-only preflight

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-supabase-readonly-preflight.yml

permissions:
  contents: read

concurrency:
  group: temporary-supabase-readonly-preflight
  cancel-in-progress: false

jobs:
  preflight:
    name: Production readiness (read only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Ensure PostgreSQL client is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y postgresql-client
          fi

      - name: Run fixed anonymized preflight
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL is not configured."
            exit 1
          fi

          psql "$SUPABASE_DB_URL" -X --set=ON_ERROR_STOP=1 <<'SQL'
          \pset pager off
          BEGIN TRANSACTION READ ONLY;
          SET LOCAL statement_timeout = '30s';
          SET LOCAL lock_timeout = '5s';

          select
            now() as checked_at,
            current_database() as database_name,
            current_setting('server_version') as postgres_version,
            current_setting('transaction_read_only') as transaction_read_only;

          select
            count(*) filter (
              where org_type in ('municipality', 'obec')
                and parent_organization_id is null
            ) as municipalities,
            count(*) filter (where org_type = 'school') as schools,
            count(*) filter (
              where org_type in ('association', 'spolek')
            ) as associations,
            count(*) filter (where license_status = 'active') as active_licenses,
            count(*) filter (
              where license_status = 'pending_approval'
            ) as pending_licenses
          from public.organizations;

          select
            (select count(*) from public.organizations) as organizations_total,
            (select count(*) from public.organization_members) as memberships_total,
            (select count(*) from public.profiles) as profiles_total,
            (select count(*) from public.orders_start) as orders_total,
            (
              select count(*)
              from public.orders_start
              where organization_id is not null
            ) as orders_linked_to_organization;

          select
            org_type,
            status,
            license_status,
            count(*) as organization_count
          from public.organizations
          group by org_type, status, license_status
          order by org_type, status, license_status;

          select count(*) as expired_active_licenses
          from public.organizations
          where license_status = 'active'
            and license_valid_until is not null
            and license_valid_until < now();

          select count(*) as duplicate_membership_pairs
          from (
            select organization_id, user_id
            from public.organization_members
            group by organization_id, user_id
            having count(*) > 1
          ) duplicates;

          select
            to_regclass('public.organizations') is not null
              as organizations_exists,
            to_regclass('public.organization_members') is not null
              as organization_members_exists,
            to_regclass('public.profiles') is not null as profiles_exists,
            to_regprocedure('public.is_admin()') is not null
              as is_admin_exists,
            to_regprocedure('public.get_my_organizations(uuid[])') is not null
              as get_my_organizations_exists,
            to_regprocedure(
              'public.activate_customer_with_admin(uuid,uuid,text,text,boolean)'
            ) is not null as previous_activation_exists;

          select
            exists (
              select 1
              from information_schema.columns
              where table_schema = 'public'
                and table_name = 'organizations'
                and column_name = 'license_plan'
            ) as license_plan_column_exists,
            to_regclass('public.municipality_organization_invites') is not null
              as invite_table_exists,
            to_regclass('public.api_rate_limits') is not null
              as rate_limit_table_exists,
            to_regprocedure(
              'public.activate_customer_with_admin_v2(uuid,uuid,text,text,text,timestamptz,timestamptz,text,text,boolean,boolean)'
            ) is not null as activation_v2_exists,
            to_regprocedure(
              'public.consume_api_rate_limit(text,text,integer,integer)'
            ) is not null as rate_limit_function_exists;

          select
            count(*) = 1 as system_organization_exists,
            bool_and(org_type = 'school') as system_organization_is_school,
            bool_and(is_system) as system_organization_is_system
          from public.organizations
          where id = '339612be-8577-4cce-8ef4-e77a4bc0b442'::uuid;

          ROLLBACK;
          SQL
