name: Temporary E2E cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/e2e-onboarding-cleanup.yml

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Inspect only designated E2E request state
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" --no-psqlrc --set ON_ERROR_STOP=1 -At <<'SQL'
          select
            'row=' || count(*),
            'status=' || coalesce(max(status), ''),
            'license_status=' || coalesce(max(license_status), ''),
            'name_match=' || bool_or(name = 'E2E TEST ARCHIMEDES 2026-07-23'),
            'registration_match=' || bool_or(registration_number = '6786'),
            'type_match=' || bool_or(org_type in ('municipality', 'obec')),
            'email_match=' || bool_or(contact_email = 'antonin.koplik+arch-e2e-20260723@gmail.com')
          from public.organizations
          where id = '9b740d2e-fddc-4722-8825-81ec5c92bdab'::uuid;

          select 'orders=' || count(*)
          from public.orders_start
          where organization_id = '9b740d2e-fddc-4722-8825-81ec5c92bdab'::uuid;

          select 'memberships=' || count(*)
          from public.organization_members
          where organization_id = '9b740d2e-fddc-4722-8825-81ec5c92bdab'::uuid;

          select 'invites=' || count(*)
          from public.municipality_organization_invites
          where municipality_id = '9b740d2e-fddc-4722-8825-81ec5c92bdab'::uuid;

          select 'children=' || count(*)
          from public.organizations
          where parent_organization_id = '9b740d2e-fddc-4722-8825-81ec5c92bdab'::uuid;
          SQL
