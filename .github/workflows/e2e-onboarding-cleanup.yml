name: Temporary E2E cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/e2e-onboarding-cleanup.yml

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Delete only the designated pending E2E request
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_DB_URL:-}" ]]; then
            echo "Missing SUPABASE_DB_URL" >&2
            exit 1
          fi
          psql "$SUPABASE_DB_URL" --no-psqlrc --set ON_ERROR_STOP=1 <<'SQL'
          begin;

          do $cleanup$
          declare
            target_id constant uuid := '9b740d2e-fddc-4722-8825-81ec5c92bdab';
            matches integer;
            memberships integer;
            invites integer;
            children integer;
            deleted_rows integer;
          begin
            select count(*) into matches
            from public.organizations
            where id = target_id
              and name = 'E2E TEST ARCHIMEDES 2026-07-23'
              and registration_number = '6786'
              and org_type in ('municipality', 'obec')
              and status = 'pending'
              and license_status = 'pending_approval'
              and contact_email = 'antonin.koplik+arch-e2e-20260723@gmail.com';

            if matches <> 1 then
              raise exception 'Safety guard failed: expected one exact pending E2E organization, found %', matches;
            end if;

            select count(*) into memberships
            from public.organization_members
            where organization_id = target_id;

            select count(*) into invites
            from public.municipality_organization_invites
            where municipality_id = target_id;

            select count(*) into children
            from public.organizations
            where parent_organization_id = target_id;

            if memberships <> 0 or invites <> 0 or children <> 0 then
              raise exception 'Safety guard failed: memberships=%, invites=%, children=%',
                memberships, invites, children;
            end if;

            delete from public.orders_start
            where organization_id = target_id;

            delete from public.organizations
            where id = target_id
              and status = 'pending'
              and license_status = 'pending_approval';

            get diagnostics deleted_rows = row_count;
            if deleted_rows <> 1 then
              raise exception 'Cleanup failed: deleted organization rows=%', deleted_rows;
            end if;

            if exists (select 1 from public.organizations where id = target_id)
               or exists (select 1 from public.orders_start where organization_id = target_id) then
              raise exception 'Cleanup verification failed: designated E2E data remains';
            end if;

            raise notice 'Exact pending E2E organization and linked order removed; no memberships, invites, children, or auth user existed.';
          end
          $cleanup$;

          commit;
          SQL
