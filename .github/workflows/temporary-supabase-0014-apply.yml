name: One-time Supabase 0014 read-only verification

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/temporary-supabase-0014-apply.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: archimedes-live-supabase-verification
  cancel-in-progress: false

jobs:
  verify:
    name: Verify migration 0014 read only
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Ensure PostgreSQL client is available
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_DB_URL"
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y postgresql-client
          fi

      - name: Run fixed read-only verification
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          output_file="$RUNNER_TEMP/supabase-0014-verification.log"

          psql "$SUPABASE_DB_URL" -X --set=ON_ERROR_STOP=1 >"$output_file" <<'SQL'
          BEGIN TRANSACTION READ ONLY;

          DO $verify$
          DECLARE
            missing_columns integer;
            missing_constraints integer;
          BEGIN
            SELECT count(*) INTO missing_columns
            FROM unnest(ARRAY[
              'requested_license_plan',
              'terms_accepted_at',
              'terms_version',
              'license_plan',
              'license_started_at',
              'contract_status',
              'billing_status',
              'activated_at',
              'activated_by',
              'classroom_eligibility_verified_at',
              'classroom_eligibility_verified_by'
            ]) AS expected(column_name)
            WHERE NOT EXISTS (
              SELECT 1
              FROM information_schema.columns actual
              WHERE actual.table_schema = 'public'
                AND actual.table_name = 'organizations'
                AND actual.column_name = expected.column_name
            );

            IF missing_columns <> 0 THEN
              RAISE EXCEPTION 'Missing required 0014 organization columns: %', missing_columns;
            END IF;

            SELECT count(*) INTO missing_constraints
            FROM unnest(ARRAY[
              'organizations_requested_license_plan_allowed',
              'organizations_license_plan_allowed',
              'organizations_contract_status_allowed',
              'organizations_billing_status_allowed'
            ]) AS expected(constraint_name)
            WHERE NOT EXISTS (
              SELECT 1
              FROM pg_constraint actual
              JOIN pg_class relation ON relation.oid = actual.conrelid
              JOIN pg_namespace namespace ON namespace.oid = relation.relnamespace
              WHERE namespace.nspname = 'public'
                AND relation.relname = 'organizations'
                AND actual.conname = expected.constraint_name
            );

            IF missing_constraints <> 0 THEN
              RAISE EXCEPTION 'Missing required 0014 constraints: %', missing_constraints;
            END IF;

            IF to_regclass('public.municipality_organization_invites') IS NULL
               OR to_regclass('public.api_rate_limits') IS NULL THEN
              RAISE EXCEPTION 'Required 0014 table missing';
            END IF;

            IF NOT (
              SELECT relrowsecurity
              FROM pg_class
              WHERE oid = 'public.municipality_organization_invites'::regclass
            ) OR NOT (
              SELECT relrowsecurity
              FROM pg_class
              WHERE oid = 'public.api_rate_limits'::regclass
            ) THEN
              RAISE EXCEPTION 'RLS is not enabled on a required 0014 table';
            END IF;

            IF to_regprocedure(
              'public.activate_customer_with_admin_v2(uuid,uuid,text,text,text,timestamptz,timestamptz,text,text,boolean,boolean)'
            ) IS NULL OR to_regprocedure(
              'public.consume_api_rate_limit(text,text,integer,integer)'
            ) IS NULL THEN
              RAISE EXCEPTION 'Required 0014 function missing';
            END IF;

            IF has_table_privilege('anon', 'public.municipality_organization_invites', 'SELECT')
               OR has_table_privilege('authenticated', 'public.municipality_organization_invites', 'SELECT')
               OR has_table_privilege('anon', 'public.api_rate_limits', 'SELECT')
               OR has_table_privilege('authenticated', 'public.api_rate_limits', 'SELECT') THEN
              RAISE EXCEPTION 'Public roles have an unexpected 0014 table privilege';
            END IF;

            IF NOT has_table_privilege(
              'service_role', 'public.municipality_organization_invites', 'SELECT,INSERT,UPDATE,DELETE'
            ) OR NOT has_table_privilege(
              'service_role', 'public.api_rate_limits', 'SELECT,INSERT,UPDATE,DELETE'
            ) THEN
              RAISE EXCEPTION 'service_role is missing a required 0014 table privilege';
            END IF;

            IF has_function_privilege(
              'anon',
              'public.activate_customer_with_admin_v2(uuid,uuid,text,text,text,timestamptz,timestamptz,text,text,boolean,boolean)',
              'EXECUTE'
            ) OR NOT has_function_privilege(
              'authenticated',
              'public.activate_customer_with_admin_v2(uuid,uuid,text,text,text,timestamptz,timestamptz,text,text,boolean,boolean)',
              'EXECUTE'
            ) OR has_function_privilege(
              'authenticated',
              'public.consume_api_rate_limit(text,text,integer,integer)',
              'EXECUTE'
            ) OR NOT has_function_privilege(
              'service_role',
              'public.consume_api_rate_limit(text,text,integer,integer)',
              'EXECUTE'
            ) THEN
              RAISE EXCEPTION 'Unexpected 0014 function privileges';
            END IF;
          END
          $verify$;

          SELECT
            (SELECT count(*) FROM public.organizations) AS organizations,
            (SELECT count(*) FROM public.organization_members) AS memberships,
            (SELECT count(*) FROM public.profiles) AS profiles,
            (SELECT count(*) FROM public.orders_start) AS orders,
            (SELECT count(*) FROM public.municipality_organization_invites) AS invites,
            (SELECT count(*) FROM public.api_rate_limits) AS rate_limit_rows;

          ROLLBACK;
          SQL

          counts="$(awk -F'|' '
            /^[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*$/ {
              gsub(/[[:space:]]/, "", $0); value=$0
            }
            END { print value }
          ' "$output_file")"
          test -n "$counts"
          echo "COUNTS=$counts" >> "$GITHUB_ENV"
          echo "Read-only verification passed. Anonymous counts: $counts"

      - name: Publish verification summary
        shell: bash
        run: |
          {
            echo "## Supabase migration 0014 verification"
            echo
            echo "- Transaction mode: READ ONLY"
            echo "- Transaction end: ROLLBACK"
            echo "- 11 organization columns: verified"
            echo "- 4 organization constraints: verified"
            echo "- 2 tables and RLS: verified"
            echo "- 2 functions and privileges: verified"
            echo "- Anonymous counts (organizations|memberships|profiles|orders|invites|rate-limit rows): $COUNTS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$VERIFY_OUTCOME" == "success" ]]; then
            state="success"
            description="Migration 0014 schema, RLS, privileges and anonymous counts verified read only"
          else
            state="failure"
            description="Read-only verification of migration 0014 failed"
          fi
          jq -n --arg state "$state" --arg description "$description"             '{state:$state,description:$description,context:"Supabase 0014 read-only verification"}'             | curl --fail --silent --show-error -X POST               -H "Accept: application/vnd.github+json"               -H "Authorization: Bearer $GH_TOKEN"               -H "X-GitHub-Api-Version: 2022-11-28"               "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA"               -d @- > /dev/null
