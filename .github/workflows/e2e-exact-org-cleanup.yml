name: One-time exact E2E organization cleanup

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Remove unique never-activated E2E organization
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" --no-psqlrc --set ON_ERROR_STOP=1 <<'SQL'
          begin;
          do $cleanup$
          declare
            target_id uuid;
            matches integer;
            memberships integer;
            invites integer;
            children integer;
            deleted_rows integer;
          begin
            select count(*), min(id::text)::uuid into matches, target_id
            from public.organizations
            where name = 'E2E TEST ARCHIMEDES 2026-07-23'
              and registration_number = '6786'
              and org_type in ('municipality', 'obec')
              and license_status = 'pending_approval'
              and contact_email = 'antonin.koplik+arch-e2e-20260723@gmail.com'
              and activated_at is null
              and license_plan is null
              and contract_status = 'pending'
              and billing_status = 'pending';

            if matches <> 1 or target_id is null then
              raise exception 'Safety guard failed: unique never-activated E2E match count=%', matches;
            end if;

            select count(*) into memberships from public.organization_members where organization_id = target_id;
            select count(*) into invites from public.municipality_organization_invites where municipality_id = target_id;
            select count(*) into children from public.organizations where parent_organization_id = target_id;

            if memberships <> 0 or invites <> 0 or children <> 0 then
              raise exception 'Safety guard failed: memberships=%, invites=%, children=%',
                memberships, invites, children;
            end if;

            delete from public.orders_start where organization_id = target_id;\n            delete from public.access_requests where organization_id = target_id;

            delete from public.organizations
            where id = target_id
              and name = 'E2E TEST ARCHIMEDES 2026-07-23'
              and registration_number = '6786'
              and license_status = 'pending_approval'
              and contact_email = 'antonin.koplik+arch-e2e-20260723@gmail.com'
              and activated_at is null
              and license_plan is null
              and contract_status = 'pending'
              and billing_status = 'pending';

            get diagnostics deleted_rows = row_count;
            if deleted_rows <> 1 then
              raise exception 'Cleanup failed: deleted organization rows=%', deleted_rows;
            end if;

            if exists (select 1 from public.organizations where id = target_id)
               or exists (select 1 from public.orders_start where organization_id = target_id)\n               or exists (select 1 from public.access_requests where organization_id = target_id) then
              raise exception 'Cleanup verification failed: designated data remains';
            end if;

            raise notice 'Verified cleanup complete for one unique never-activated E2E organization.';
          end
          $cleanup$;
          commit;
          SQL
